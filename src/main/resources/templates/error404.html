<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head}"></head>

<body>

  <!--=================================
    header -->
  <header th:replace="~{layout/header :: header}"></header>
  <!--=================================
    header -->

  <!--=================================
    banner -->
  <section class="inner-banner bg-light">
    <div class="container">
      <div class="row align-items-center intro-title">
        <div class="col-12">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="index.html"> <i class="fas fa-home"></i> </a></li>
            </li>
            <li class="breadcrumb-item active"> <i class="fas fa-chevron-right"></i> <span> error404</span></li>
          </ol>
        </div>
      </div>
    </div>
  </section>
  <!--=================================
    banner -->

      <div class="row g-0">
        <div class="col-md-12">
          <img class="img-fluid" th:src="@{/images/error/404-bg.png}" alt="">

      </div>
    </div>
    <div class="container space-sm-pt">
      <div class="row justify-content-center">
        <div class="col-xl-6 col-lg-9 col-md-10">
          <div class="text-center contant-404">

            <h3 class="mb-3">Parece que no podemos encontrar la pagina que estas buscando.</h3>
            <h6 class="mb-5">No encuentras la pagina? Vuelve a la pagina de inicio y sigue explorando.</h6>
            <a th:href="@{/}" class="btn btn-outline-primary"><i class="fas fa-home pr-2"></i>Vuelve al inicio</a>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!--=================================
    Error 404 -->

  <!--=================================
    footer -->
  <footer th:replace="~{layout/footer :: footer('space-pt bg-light footer')}"></footer>
  <!--=================================
    footer -->

  <!--=================================
    Javascript -->
  <div th:replace="~{fragments :: common-scripts}"></div>

</html>
